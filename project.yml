name: EnglishBuddy
options:
  bundleIdPrefix: com.hammond
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.hammond.EnglishBuddy
    DEVELOPMENT_TEAM: "8KQ9K7AWKK"
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: NO
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
    CLANG_CXX_LIBRARY: "libc++"
    SWIFT_OBJC_BRIDGING_HEADER: EnglishBuddy/Bridge/EnglishBuddy-Bridging-Header.h
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    HEADER_SEARCH_PATHS:
      - $(inherited)
      - $(SRCROOT)/third_party/LiteRT-LM
targets:
  EnglishBuddyCore:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        PRODUCT_NAME: EnglishBuddyCore
        PRODUCT_BUNDLE_IDENTIFIER: com.hammond.EnglishBuddyCore
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
    sources:
      - path: EnglishBuddy/Core
        excludes:
          - LiveSpeechPipeline.swift
          - LiteRTInferenceEngine.swift
  EnglishBuddy:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        PRODUCT_NAME: EnglishBuddy
        TARGETED_DEVICE_FAMILY: "1"
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
        ENGLISHBUDDY_ENABLE_SHERPA_ONNX: "1"
        ENGLISHBUDDY_ENABLE_PIPER: "1"
        ENGLISHBUDDY_LINK_SHERPA_ONNX: "1"
        ENGLISHBUDDY_LINK_PIPER: "1"
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
      configs:
        Debug:
          CLANG_ENABLE_CODE_COVERAGE: NO
          ENABLE_CODE_COVERAGE: NO
          ENABLE_DEBUG_DYLIB: NO
          ENABLE_PREVIEWS: NO
          ENABLE_TESTABILITY: NO
          GCC_GENERATE_TEST_COVERAGE_FILES: NO
          GCC_INSTRUMENT_PROGRAM_FLOW_ARCS: NO
    info:
      path: EnglishBuddy/Support/Info.plist
      properties:
        NSMicrophoneUsageDescription: EnglishBuddy uses the microphone for live English calls with your offline coach.
        NSSpeechRecognitionUsageDescription: EnglishBuddy uses on-device speech recognition to transcribe your English practice in real time.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    sources:
      - path: EnglishBuddy
        excludes:
          - Resources
      - path: EnglishBuddy/Resources
        buildPhase: resources
    preBuildScripts:
      - name: Build LiteRT Runtime
        script: |
          set -euo pipefail
          "${SRCROOT}/Scripts/build_litert_ios_runtime.sh"
        outputFiles:
          - $(SRCROOT)/Build/LiteRTLM/build.stamp
      - name: Prepare Sherpa Runtime
        script: |
          set -euo pipefail
          "${SRCROOT}/Scripts/prepare_sherpa_onnx_runtime.sh"
        outputFiles:
          - $(SRCROOT)/Build/SherpaOnnx/build.stamp
      - name: Embed Bundled Model
        script: |
          set -euo pipefail
          "${SRCROOT}/Scripts/embed_bundled_model.sh"
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/EmbeddedModels/gemma-4-e2b/EmbeddedModelMetadata.json
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/EmbeddedModels/gemma-4-e2b/gemma-4-E2B-it.litertlm
      - name: Embed Speech Assets
        script: |
          set -euo pipefail
          "${SRCROOT}/Scripts/embed_speech_assets.sh"
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/SpeechAssets/Manifest.json
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/SpeechAssets/RuntimeBuild.json
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: Speech.framework
      - sdk: Network.framework
      - framework: Build/LiteRTLM/LiteRTLMRuntime.xcframework
        embed: true
        codeSign: true
      - framework: Build/LiteRTLM/GemmaModelConstraintProvider.xcframework
        embed: true
        codeSign: true
      - framework: Build/SherpaOnnx/sherpa-onnx.xcframework
        embed: false
        codeSign: false
      - framework: Build/SherpaOnnx/onnxruntime.xcframework
        embed: false
        codeSign: false
  EnglishBuddyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        PRODUCT_NAME: EnglishBuddyTests
        PRODUCT_BUNDLE_IDENTIFIER: com.hammond.EnglishBuddyTests
        TEST_HOST: ""
        BUNDLE_LOADER: ""
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: EnglishBuddyTests/Info.plist
    sources:
      - path: EnglishBuddyTests
    dependencies:
      - target: EnglishBuddyCore
schemes:
  EnglishBuddy:
    build:
      targets:
        EnglishBuddyCore: all
        EnglishBuddy: all
        EnglishBuddyTests: [test]
    test:
      gatherCoverageData: false
      targets:
        - EnglishBuddyTests
